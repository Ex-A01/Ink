<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="application-name" content="Flexlion">
    <meta name="description" content="Splatoon 3 Ink Playground - Paint with real in-game ink shaders.">
    <link rel="shortcut icon" href="./assets/img/favico.ico">
    <link rel="apple-touch-icon" href="./assets/img/favico.ico">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="./assets/css/master.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink Playground - Flexlion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css">
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.7/dist/umd/popper.min.js" integrity="sha384-zYPOMqeu1DAVkHiLqWBUTcbYfZ8osu1Nd6Z89ify25QV9guujx43ITvfi12/QExE" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.min.js" integrity="sha384-Y4oOpwW3duJdCWv5ly8SCFYWqFDsfob/3GkgExXKV4idmbt98QcxXYs9UoXAB7BZ" crossorigin="anonymous"></script>
    <style>
      html, body { height: 100%; overflow: hidden; margin: 0; }
      .ink-wrap { display: flex; flex-direction: column; height: 100vh; }
      .ink-header-box { flex-shrink: 0; overflow: hidden; transition: max-height .3s ease; }
      .ink-header-box.open { max-height: 200px; }
      .ink-header-box.shut { max-height: 0; }
      .ink-frame { flex: 1; border: none; width: 100%; min-height: 0; }
      #headerToggle {
        display: block; width: 100%; border: none; background: #1a1d23;
        color: #888; font-size: 13px; padding: 2px 0; cursor: pointer;
        text-align: center; line-height: 1; flex-shrink: 0;
        border-bottom: 1px solid #2a2d33;
      }
      #headerToggle:hover { color: #ccc; background: #22252b; }
    </style>
</head>
<body>
  <div class="ink-wrap">
    <div class="ink-header-box open" id="headerBox">
      <div class="container">
        <header class="d-flex flex-wrap justify-content-center py-3 mb-0 border-bottom">
          <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">
            <img src="./assets/img/favico.ico" width="50" height="43" alt="">
            <span class="fs-4" style="padding-left: 10px;">Flexlion</span>
          </a>
          <ul class="nav nav-pills">
            <li class="nav-item"><a href="./index.html" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="./docs.html" class="nav-link">Docs</a></li>
            <li class="nav-item"><a href="./configurator.html" class="nav-link">Configurator</a></li>
            <li class="nav-item"><a href="./saveeditor.html" class="nav-link">Save Editor</a></li>
            <li class="nav-item"><a href="./fxnetctrl.html" class="nav-link">FXNETCTRL</a></li>
            <li class="nav-item"><a href="./albumsigner.html" class="nav-link">Album Signer</a></li>
            <li class="nav-item"><a href="#" class="nav-link active" aria-current="page">Ink Playground</a></li>
            <li class="nav-item"><a href="./account.html" class="nav-link">Account</a></li>
          </ul>
        </header>
      </div>
    </div>
    <button id="headerToggle">&#9650; Hide Header</button>
    <iframe class="ink-frame" src="./assets/ink_playground/index.html"></iframe>
  </div>
  <script>
    const box=document.getElementById('headerBox'), btn=document.getElementById('headerToggle');
    let open=true;
    btn.addEventListener('click',()=>{
      open=!open;
      box.className='ink-header-box '+(open?'open':'shut');
      btn.innerHTML=open?'&#9650; Hide Header':'&#9660; Show Header';
    });
  </script>
</body>
</html>
